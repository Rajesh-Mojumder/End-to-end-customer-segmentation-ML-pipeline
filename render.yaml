services:
  - type: web
    name: customer-segmentation-app
    runtime: python
    buildCommand: "pip install -r requirements.txt && python src/train.py"
    startCommand: "streamlit run app/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
    envVars:
      - key: MLFLOW_ALLOW_FILE_STORE
        value: "true"
      - key: PYTHONPATH
        value: "/opt/render/project/src"